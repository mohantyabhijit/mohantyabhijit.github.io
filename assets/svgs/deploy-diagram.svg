<svg viewBox="0 0 820 555" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;display:block;overflow:visible;">

  <style>
    /* ── Default: light mode ── */
    :root {
      --bg:       #ffffff;
      --fg:       #1a1a1a;
      --fg-muted: #6b7280;
      --surface:  #f9fafb;
      --surface2: #f3f4f6;
    }

    /* ── OS-level dark preference (fallback for no-JS contexts) ── */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:       #1a1a1a;
        --fg:       #e5e7eb;
        --fg-muted: #9ca3af;
        --surface:  #252525;
        --surface2: #2d2d2d;
      }
    }

    /* ── Site theme toggle: dark (overrides OS preference) ── */
    :root[data-theme="dark"] {
      --bg:       #1a1a1a;
      --fg:       #e5e7eb;
      --fg-muted: #9ca3af;
      --surface:  #252525;
      --surface2: #2d2d2d;
    }

    /* ── Site theme toggle: light (overrides OS dark preference) ── */
    :root[data-theme="light"] {
      --bg:       #ffffff;
      --fg:       #1a1a1a;
      --fg-muted: #6b7280;
      --surface:  #f9fafb;
      --surface2: #f3f4f6;
    }
  </style>

  <defs>
    <marker id="m-cyan"   markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto"><path d="M0,1 L0,6 L7,3.5 z" fill="#0ea5e9"/></marker>
    <marker id="m-violet" markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto"><path d="M0,1 L0,6 L7,3.5 z" fill="#7c3aed"/></marker>
    <marker id="m-green"  markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto"><path d="M0,1 L0,6 L7,3.5 z" fill="#059669"/></marker>
    <marker id="m-amber"  markerWidth="7" markerHeight="7" refX="5.5" refY="3.5" orient="auto"><path d="M0,1 L0,6 L7,3.5 z" fill="#d97706"/></marker>
  </defs>

  <!-- ── GROUP: GitHub ── -->
  <rect x="212" y="36" width="310" height="258" rx="10"
    fill="rgba(124,58,237,0.04)" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5 4" stroke-opacity="0.5"/>
  <rect x="228" y="25" width="66" height="18" rx="4" fill="var(--bg)" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.6"/>
  <text x="261" y="38.5" text-anchor="middle"
    font-family="JetBrains Mono,monospace" font-size="9" font-weight="600" letter-spacing="1.5"
    fill="#7c3aed" opacity="0.9">GITHUB</text>

  <!-- ── GROUP: Droplet ── -->
  <rect x="582" y="182" width="228" height="356" rx="10"
    fill="rgba(14,165,233,0.04)" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="5 4" stroke-opacity="0.4"/>
  <rect x="598" y="171" width="138" height="18" rx="4" fill="var(--bg)" stroke="#0ea5e9" stroke-width="1" stroke-opacity="0.6"/>
  <text x="667" y="184.5" text-anchor="middle"
    font-family="JetBrains Mono,monospace" font-size="9" font-weight="600" letter-spacing="1.2"
    fill="#0ea5e9" opacity="0.9">DROPLET · 152.42.x.x</text>

  <!-- ── ARROWS ── -->

  <!-- 1. git push → GH Actions -->
  <line x1="162" y1="96" x2="230" y2="96" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#m-cyan)"/>
  <text x="168" y="90" font-family="JetBrains Mono,monospace" font-size="8.5" fill="#0ea5e9">triggers</text>

  <!-- 2. GH Actions → rsync -->
  <line x1="388" y1="96" x2="450" y2="96" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#m-cyan)"/>
  <text x="396" y="90" font-family="JetBrains Mono,monospace" font-size="8.5" fill="#0ea5e9">deploy</text>

  <!-- 3. rsync → nginx -->
  <path d="M590,96 C650,96 697,96 697,210" fill="none" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#m-cyan)"/>
  <text x="614" y="148" font-family="JetBrains Mono,monospace" font-size="8.5" fill="#0ea5e9">rsync / SSH</text>

  <!-- Secrets -.-> GH Actions -->
  <path d="M307,196 L307,134" fill="none" stroke="#d97706" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#m-amber)"/>
  <text x="315" y="170" font-family="JetBrains Mono,monospace" font-size="8.5" fill="#d97706">injected at runtime</text>

  <!-- DNS → nginx -->
  <path d="M177,336 C360,336 520,284 620,258" fill="none" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#m-violet)"/>
  <text x="300" y="328" font-family="JetBrains Mono,monospace" font-size="8.5" fill="#7c3aed">A record → droplet IP</text>

  <!-- nginx → site 1 -->
  <path d="M665,284 L655,358" fill="none" stroke="#059669" stroke-width="1.5" marker-end="url(#m-green)"/>
  <!-- nginx → site 2 -->
  <path d="M725,272 C755,310 775,335 780,358" fill="none" stroke="#059669" stroke-width="1.5" marker-end="url(#m-green)"/>
  <!-- nginx → site 3 -->
  <path d="M697,284 C697,390 717,418 717,448" fill="none" stroke="#059669" stroke-width="1.5" stroke-dasharray="4 2.5" marker-end="url(#m-green)"/>

  <!-- ── NODES ── -->

  <!-- git push -->
  <rect x="20" y="60" width="142" height="72" rx="7"
    fill="var(--surface)" stroke="#0ea5e9" stroke-width="1.5" stroke-opacity="0.55"/>
  <text x="91" y="86" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11.5" font-weight="600" fill="var(--fg)">git push</text>
  <text x="91" y="100" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="var(--fg-muted)">to main branch</text>
  <rect x="54" y="108" width="74" height="14" rx="3" fill="rgba(14,165,233,0.1)" stroke="rgba(14,165,233,0.35)" stroke-width="1"/>
  <text x="91" y="119" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8.5" font-weight="500" fill="#0ea5e9">trigger</text>

  <!-- GitHub Actions -->
  <rect x="230" y="60" width="156" height="72" rx="7"
    fill="var(--surface)" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.55"/>
  <text x="308" y="86" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11.5" font-weight="600" fill="var(--fg)">GitHub Actions</text>
  <text x="308" y="100" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="var(--fg-muted)">CI/CD workflow runner</text>
  <rect x="264" y="108" width="88" height="14" rx="3" fill="rgba(124,58,237,0.1)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <text x="308" y="119" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8.5" font-weight="500" fill="#7c3aed">workflow</text>

  <!-- Repo Secrets -->
  <rect x="230" y="196" width="156" height="72" rx="7"
    fill="var(--surface)" stroke="#d97706" stroke-width="1.5" stroke-opacity="0.55"/>
  <text x="308" y="222" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11.5" font-weight="600" fill="var(--fg)">Repo Secrets</text>
  <text x="308" y="236" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="var(--fg-muted)">HOST · USER · SSH_KEY</text>
  <rect x="264" y="244" width="88" height="14" rx="3" fill="rgba(217,119,6,0.1)" stroke="rgba(217,119,6,0.35)" stroke-width="1"/>
  <text x="308" y="255" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8.5" font-weight="500" fill="#d97706">env vars</text>

  <!-- rsync -->
  <rect x="450" y="60" width="140" height="72" rx="7"
    fill="var(--surface)" stroke="#0ea5e9" stroke-width="1.5" stroke-opacity="0.55"/>
  <text x="520" y="86" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11.5" font-weight="600" fill="var(--fg)">rsync</text>
  <text x="520" y="100" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="var(--fg-muted)">files → droplet via SSH</text>
  <rect x="481" y="108" width="78" height="14" rx="3" fill="rgba(14,165,233,0.1)" stroke="rgba(14,165,233,0.35)" stroke-width="1"/>
  <text x="520" y="119" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8.5" font-weight="500" fill="#0ea5e9">deploy</text>

  <!-- nginx -->
  <rect x="618" y="210" width="160" height="72" rx="7"
    fill="var(--surface)" stroke="#059669" stroke-width="1.5" stroke-opacity="0.55"/>
  <text x="698" y="236" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11.5" font-weight="600" fill="var(--fg)">nginx</text>
  <text x="698" y="250" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="var(--fg-muted)">/var/www/yoursite</text>
  <rect x="655" y="258" width="86" height="14" rx="3" fill="rgba(5,150,105,0.1)" stroke="rgba(5,150,105,0.3)" stroke-width="1"/>
  <text x="698" y="269" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8.5" font-weight="500" fill="#059669">web server</text>

  <!-- site 1 -->
  <rect x="597" y="358" width="116" height="58" rx="7"
    fill="var(--surface)" stroke="#059669" stroke-width="1.5" stroke-opacity="0.45"/>
  <text x="655" y="382" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11.5" font-weight="600" fill="var(--fg)">site 1</text>
  <rect x="625" y="390" width="60" height="14" rx="3" fill="rgba(5,150,105,0.1)" stroke="rgba(5,150,105,0.3)" stroke-width="1"/>
  <text x="655" y="401" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8.5" font-weight="500" fill="#059669">vhost</text>

  <!-- site 2 -->
  <rect x="726" y="358" width="116" height="58" rx="7"
    fill="var(--surface)" stroke="#059669" stroke-width="1.5" stroke-opacity="0.45"/>
  <text x="784" y="382" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11.5" font-weight="600" fill="var(--fg)">site 2</text>
  <rect x="754" y="390" width="60" height="14" rx="3" fill="rgba(5,150,105,0.1)" stroke="rgba(5,150,105,0.3)" stroke-width="1"/>
  <text x="784" y="401" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8.5" font-weight="500" fill="#059669">vhost</text>

  <!-- site 3 (dashed border = expandable) -->
  <rect x="660" y="448" width="116" height="58" rx="7"
    fill="var(--surface2)" stroke="#059669" stroke-width="1.5" stroke-opacity="0.3" stroke-dasharray="4 2.5"/>
  <text x="718" y="472" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11.5" font-weight="600" fill="var(--fg-muted)">site 3</text>
  <rect x="688" y="480" width="60" height="14" rx="3" fill="rgba(5,150,105,0.07)" stroke="rgba(5,150,105,0.2)" stroke-width="1"/>
  <text x="718" y="491" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8.5" font-weight="500" fill="#059669" opacity="0.65">vhost</text>

  <!-- Domain Registrar / DNS -->
  <rect x="20" y="300" width="157" height="72" rx="7"
    fill="var(--surface)" stroke="#7c3aed" stroke-width="1.5" stroke-opacity="0.55"/>
  <text x="98" y="326" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="11.5" font-weight="600" fill="var(--fg)">Domain Registrar</text>
  <text x="98" y="340" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="var(--fg-muted)">A record → droplet IP</text>
  <rect x="62" y="348" width="72" height="14" rx="3" fill="rgba(124,58,237,0.1)" stroke="rgba(124,58,237,0.3)" stroke-width="1"/>
  <text x="98" y="359" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8.5" font-weight="500" fill="#7c3aed">DNS</text>

  <!-- ── STEP BADGES ── -->
  <circle cx="196" cy="96" r="9" fill="var(--bg)" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="196" y="100" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8" font-weight="600" fill="#0ea5e9">1</text>

  <circle cx="420" cy="96" r="9" fill="var(--bg)" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="420" y="100" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8" font-weight="600" fill="#0ea5e9">2</text>

  <circle cx="646" cy="150" r="9" fill="var(--bg)" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="646" y="154" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="8" font-weight="600" fill="#0ea5e9">3</text>

  <!-- ── LEGEND ── -->
  <g transform="translate(20,518)">
    <line x1="0" y1="7" x2="20" y2="7" stroke="#0ea5e9" stroke-width="1.5" marker-end="url(#m-cyan)"/>
    <text x="26" y="11" font-family="JetBrains Mono,monospace" font-size="9" fill="var(--fg-muted)">Deploy flow</text>

    <line x1="104" y1="7" x2="124" y2="7" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4 2.5" marker-end="url(#m-amber)"/>
    <text x="130" y="11" font-family="JetBrains Mono,monospace" font-size="9" fill="var(--fg-muted)">Secret injection</text>

    <line x1="236" y1="7" x2="256" y2="7" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#m-violet)"/>
    <text x="262" y="11" font-family="JetBrains Mono,monospace" font-size="9" fill="var(--fg-muted)">DNS resolution</text>

    <line x1="366" y1="7" x2="386" y2="7" stroke="#059669" stroke-width="1.5" marker-end="url(#m-green)"/>
    <text x="392" y="11" font-family="JetBrains Mono,monospace" font-size="9" fill="var(--fg-muted)">nginx routing</text>
  </g>

</svg>
