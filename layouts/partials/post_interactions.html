{{- if and (eq .Kind "page") (in .RelPermalink "/posts/") }}
<section class="post-interactions" id="post-interactions" data-post-key="{{ .RelPermalink }}">
  <div class="post-like">
    <button type="button" class="post-like-button" id="post-like-button">👍 Like</button>
    <span class="post-like-count" id="post-like-count">0</span>
  </div>

  <div class="post-comments">
    <h2>Comments</h2>
    <form id="post-comment-form" class="post-comment-form">
      <label class="post-comment-label" for="post-comment-name">Add a comment</label>
      <input type="text" id="post-comment-name" class="post-comment-name" placeholder="Name (optional)" maxlength="50">
      <label for="post-comment-input" class="sr-only">Comment</label>
      <textarea id="post-comment-input" rows="3" maxlength="500" placeholder="Your comment..." required></textarea>
      <div class="post-comment-actions">
        <button type="submit">Post</button>
      </div>
    </form>
    <div id="post-comments-list" class="post-comments-list"></div>
  </div>
</section>

<script>
  (() => {
    const root = document.getElementById("post-interactions");
    if (!root) return;

    const postKey = root.dataset.postKey || window.location.pathname;
    const API = "/api/interactions";

    const likeButton = document.getElementById("post-like-button");
    const likeCount = document.getElementById("post-like-count");
    const form = document.getElementById("post-comment-form");
    const nameInput = document.getElementById("post-comment-name");
    const textInput = document.getElementById("post-comment-input");
    const commentsList = document.getElementById("post-comments-list");

    const headerLikes = document.getElementById("post-header-likes");

    const updateHeaderLikes = (count) => {
      if (headerLikes) {
        if (count > 0) {
          headerLikes.textContent = `👍 ${count}`;
          headerLikes.style.display = "";
        } else {
          headerLikes.style.display = "none";
        }
      }
    };

    const likedKey = `post-liked:${postKey}`;
    let hasLiked = localStorage.getItem(likedKey) === "true";
    let comments = [];

    const escapeHtml = (value) =>
      value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");

    const commentHtml = (c, isReply = false) => {
      const displayName = c.name ? escapeHtml(c.name) : "Anonymous";
      return `
        <div class="post-comment ${isReply ? "is-reply" : ""}" data-comment-id="${escapeHtml(c.id)}">
          <span class="post-comment-author">${displayName}</span>
          <p>${escapeHtml(c.text)}</p>
          ${isReply ? "" : `<button type="button" class="post-reply-button" data-reply-id="${escapeHtml(c.id)}">Reply</button>`}
        </div>
      `;
    };

    const closeInlineReplyForm = () => {
      const existing = commentsList.querySelector(".post-inline-reply-form");
      if (existing) existing.remove();
    };

    const openInlineReplyForm = (parentId, threadEl) => {
      closeInlineReplyForm();

      const formEl = document.createElement("div");
      formEl.className = "post-inline-reply-form";
      formEl.innerHTML = `
        <input type="text" class="post-comment-name" placeholder="Name (optional)" maxlength="50">
        <textarea rows="2" maxlength="500" placeholder="Write a reply..." required></textarea>
        <div class="post-inline-reply-actions">
          <button type="button" class="post-inline-reply-submit">Post</button>
          <button type="button" class="post-inline-reply-cancel">Cancel</button>
        </div>
      `;

      threadEl.appendChild(formEl);

      const replyNameInput = formEl.querySelector("input");
      const replyTextarea = formEl.querySelector("textarea");
      const submitBtn = formEl.querySelector(".post-inline-reply-submit");
      const cancelBtn = formEl.querySelector(".post-inline-reply-cancel");

      replyTextarea.focus();

      cancelBtn.addEventListener("click", () => formEl.remove());

      submitBtn.addEventListener("click", () => {
        const text = replyTextarea.value.trim().slice(0, 500);
        if (!text) return;
        submitBtn.disabled = true;

        fetch(API, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: "comment",
            post: postKey,
            text,
            name: replyNameInput.value.trim().slice(0, 50),
            parentId: parentId,
          }),
        })
          .then((r) => {
            if (!r.ok) throw new Error("Failed");
            return r.json();
          })
          .then((newComment) => {
            comments.push(newComment);
            renderComments();
          })
          .catch(() => {
            alert("Could not post reply. Please try again.");
            submitBtn.disabled = false;
          });
      });
    };

    const renderComments = () => {
      if (!comments.length) {
        commentsList.innerHTML = "<p class=\"post-comments-empty\">No comments yet.</p>";
        return;
      }

      const topLevel = comments.filter((c) => !c.parentId);

      commentsList.innerHTML = topLevel
        .map((c) => {
          const replies = comments.filter((r) => r.parentId === c.id);
          return `
            <div class="post-comment-thread">
              ${commentHtml(c)}
              ${replies.length ? `<div class="post-replies">${replies.map((r) => commentHtml(r, true)).join("")}</div>` : ""}
            </div>
          `;
        })
        .join("");

      commentsList.querySelectorAll(".post-reply-button").forEach((button) => {
        button.addEventListener("click", () => {
          const parentId = button.dataset.replyId;
          const threadEl = button.closest(".post-comment-thread");
          openInlineReplyForm(parentId, threadEl);
        });
      });
    };

    // Fetch initial data
    fetch(`${API}?post=${encodeURIComponent(postKey)}`)
      .then((r) => r.json())
      .then((data) => {
        likeCount.textContent = String(data.likes || 0);
        updateHeaderLikes(data.likes || 0);
        comments = data.comments || [];
        renderComments();
      })
      .catch(() => {
        commentsList.innerHTML = "<p class=\"post-comments-empty\">Could not load comments.</p>";
      });

    const updateLikeButton = () => {
      likeButton.textContent = hasLiked ? "👍 Liked" : "👍 Like";
    };

    updateLikeButton();

    likeButton.addEventListener("click", () => {
      const action = hasLiked ? "unlike" : "like";
      likeButton.disabled = true;

      fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action, post: postKey }),
      })
        .then((r) => r.json())
        .then((data) => {
          hasLiked = !hasLiked;
          localStorage.setItem(likedKey, hasLiked ? "true" : "");
          likeCount.textContent = String(data.likes);
          updateHeaderLikes(data.likes);
          updateLikeButton();
        })
        .catch(() => {})
        .finally(() => {
          likeButton.disabled = false;
        });
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const text = textInput.value.trim().slice(0, 500);
      if (!text) return;

      const submitBtn = form.querySelector("button[type=submit]");
      submitBtn.disabled = true;

      fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action: "comment",
          post: postKey,
          text,
          name: nameInput.value.trim().slice(0, 50),
        }),
      })
        .then((r) => {
          if (!r.ok) throw new Error("Failed");
          return r.json();
        })
        .then((newComment) => {
          comments.push(newComment);
          textInput.value = "";
          nameInput.value = "";
          renderComments();
        })
        .catch(() => {
          alert("Could not post comment. Please try again.");
        })
        .finally(() => {
          submitBtn.disabled = false;
        });
    });
  })();
</script>
{{- end }}
