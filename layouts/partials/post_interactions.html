{{- if and (eq .Kind "page") (in .RelPermalink "/posts/") }}
<section class="post-interactions" id="post-interactions" data-post-key="{{ .RelPermalink }}">
  <div class="post-like">
    <button type="button" class="post-like-button" id="post-like-button">👍 Like</button>
    <span class="post-like-count" id="post-like-count">0</span>
  </div>

  <div class="post-comments">
    <h2>Comments</h2>
    <form id="post-comment-form" class="post-comment-form">
      <label class="post-comment-label" for="post-comment-input">Add a comment</label>
      <textarea id="post-comment-input" rows="3" maxlength="500" required></textarea>
      <div class="post-comment-actions">
        <span id="post-replying-to" class="post-replying-to" hidden></span>
        <button type="submit">Post</button>
      </div>
    </form>
    <div id="post-comments-list" class="post-comments-list"></div>
  </div>
</section>

<script>
  (() => {
    const root = document.getElementById("post-interactions");
    if (!root) return;

    const postKey = root.dataset.postKey || window.location.pathname;
    const likedKey = `post-liked:${postKey}`;
    const API = "/api/interactions";
    const REPLY_PREVIEW_LENGTH = 60;

    const likeButton = document.getElementById("post-like-button");
    const likeCount = document.getElementById("post-like-count");
    const form = document.getElementById("post-comment-form");
    const input = document.getElementById("post-comment-input");
    const replyingTo = document.getElementById("post-replying-to");
    const commentsList = document.getElementById("post-comments-list");

    let hasLiked = localStorage.getItem(likedKey) === "true";
    let comments = [];
    let replyTargetId = null;

    const escapeHtml = (value) =>
      value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");

    const setReplyTarget = (commentId, previewText = "") => {
      replyTargetId = commentId || null;
      if (!replyTargetId) {
        replyingTo.hidden = true;
        replyingTo.textContent = "";
        return;
      }
      replyingTo.hidden = false;
      const preview = previewText.length > REPLY_PREVIEW_LENGTH ? `${previewText.slice(0, REPLY_PREVIEW_LENGTH)}...` : previewText;
      replyingTo.textContent = `Replying to: ${preview}`;
    };

    const commentHtml = (comment, isReply = false) => `
      <div class="post-comment ${isReply ? "is-reply" : ""}" data-comment-id="${escapeHtml(comment.id)}">
        <p>${escapeHtml(comment.text)}</p>
        ${isReply ? "" : `<button type="button" class="post-reply-button" data-reply-id="${escapeHtml(comment.id)}" data-reply-text="${escapeHtml(comment.text)}">Reply</button>`}
      </div>
    `;

    const renderComments = () => {
      if (!comments.length) {
        commentsList.innerHTML = "<p class=\"post-comments-empty\">No comments yet.</p>";
        return;
      }

      const topLevel = comments.filter((c) => !c.parentId);
      const topLevelIds = new Set(topLevel.map((c) => c.id));

      commentsList.innerHTML = topLevel
        .map((c) => {
          const replies = comments.filter((r) => r.parentId === c.id);
          return `
            <div class="post-comment-thread">
              ${commentHtml(c)}
              ${replies.length ? `<div class="post-replies">${replies.map((r) => commentHtml(r, true)).join("")}</div>` : ""}
            </div>
          `;
        })
        .join("");

      commentsList.querySelectorAll(".post-reply-button").forEach((button) => {
        button.addEventListener("click", () => setReplyTarget(button.dataset.replyId, button.dataset.replyText || ""));
      });
    };

    // Fetch initial data from API
    fetch(`${API}?post=${encodeURIComponent(postKey)}`)
      .then((r) => r.json())
      .then((data) => {
        likeCount.textContent = String(data.likes || 0);
        comments = data.comments || [];
        renderComments();
      })
      .catch(() => {
        commentsList.innerHTML = "<p class=\"post-comments-empty\">Could not load comments.</p>";
      });

    if (hasLiked) {
      likeButton.disabled = true;
      likeButton.textContent = "👍 Liked";
    }

    likeButton.addEventListener("click", () => {
      if (hasLiked) return;
      likeButton.disabled = true;
      likeButton.textContent = "👍 Liked";

      fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "like", post: postKey }),
      })
        .then((r) => r.json())
        .then((data) => {
          hasLiked = true;
          localStorage.setItem(likedKey, "true");
          likeCount.textContent = String(data.likes);
        })
        .catch(() => {
          likeButton.disabled = false;
          likeButton.textContent = "👍 Like";
        });
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const text = input.value.trim().slice(0, 500);
      if (!text) return;

      const submitBtn = form.querySelector("button[type=submit]");
      submitBtn.disabled = true;

      fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action: "comment",
          post: postKey,
          text,
          parentId: replyTargetId || "",
        }),
      })
        .then((r) => {
          if (!r.ok) throw new Error("Failed");
          return r.json();
        })
        .then((newComment) => {
          comments.push(newComment);
          input.value = "";
          setReplyTarget(null);
          renderComments();
        })
        .catch(() => {
          alert("Could not post comment. Please try again.");
        })
        .finally(() => {
          submitBtn.disabled = false;
        });
    });
  })();
</script>
{{- end }}
