<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="DNS resolution flow illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#1f3b73"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7dd3fc"/>
    </marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <text x="70" y="110" fill="#e2e8f0" font-family="Inter,Arial,sans-serif" font-size="56" font-weight="700">How DNS Works</text>
  <text x="70" y="155" fill="#cbd5e1" font-family="Inter,Arial,sans-serif" font-size="28">Name → Resolver → Root → TLD → Authoritative → IP</text>

  <g font-family="Inter,Arial,sans-serif" font-size="20" fill="#e2e8f0">
    <rect x="90" y="250" rx="14" ry="14" width="170" height="90" fill="#0f172a" stroke="#7dd3fc"/>
    <text x="132" y="304">Browser</text>

    <rect x="320" y="250" rx="14" ry="14" width="170" height="90" fill="#0f172a" stroke="#7dd3fc"/>
    <text x="352" y="304">Resolver</text>

    <rect x="550" y="200" rx="14" ry="14" width="170" height="90" fill="#0f172a" stroke="#7dd3fc"/>
    <text x="607" y="254">Root</text>

    <rect x="550" y="350" rx="14" ry="14" width="170" height="90" fill="#0f172a" stroke="#7dd3fc"/>
    <text x="620" y="404">.com</text>

    <rect x="790" y="250" rx="14" ry="14" width="230" height="90" fill="#0f172a" stroke="#7dd3fc"/>
    <text x="827" y="304">Authoritative NS</text>
  </g>

  <line x1="260" y1="295" x2="320" y2="295" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="490" y1="295" x2="550" y2="245" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="490" y1="295" x2="550" y2="395" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="720" y1="245" x2="790" y2="295" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="720" y1="395" x2="790" y2="295" stroke="#7dd3fc" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="790" y="390" fill="#bae6fd" font-family="JetBrains Mono,monospace" font-size="24">A 203.0.113.42</text>
</svg>
